<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reset Password | SecureAuth-Pro</title>

    <link rel="stylesheet" href="/css/style.css">


<body>

    <div class="container">

        <div class="login-card">

            <h1>Reset Password</h1>

            <p>Create a new password for your account</p>

            <form id="resetForm">

                <input
                    type="password"
                    id="password"
                    placeholder="New Password"
                    required>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <button
                    type="submit"
                    class="login-btn">

                    Reset Password

                </button>

            </form>

            <div id="message"></div>

        </div>

    </div>

    <script src="/js/reset-password.js"></script>

</body>

</html>
