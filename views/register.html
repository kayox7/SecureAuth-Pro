<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SecureAuth-Pro | Register</title>

    <link rel="stylesheet" href="/css/style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="container">

<div class="login-card">

<h1>Create Account</h1>

<p>Join SecureAuth-Pro</p>

<form id="registerForm">

<div class="input-group">

<i class="fa-solid fa-user"></i>

<input
type="text"
id="fullname"
placeholder="Full Name"
required>

</div>

<div class="input-group">

<i class="fa-solid fa-envelope"></i>

<input
type="email"
id="email"
placeholder="Email Address"
required>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="button"
class="togglePassword">

<i class="fa-solid fa-eye"></i>

</button>

</div>

<div class="input-group">

<i class="fa-solid fa-lock"></i>

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password"
required>

</div>

<div id="strengthBar">

<div id="strength"></div>

</div>

<ul class="password-rules">

<li id="length">✔ 8 Characters</li>

<li id="upper">✔ Uppercase Letter</li>

<li id="lower">✔ Lowercase Letter</li>

<li id="number">✔ Number</li>

<li id="special">✔ Special Character</li>

</ul>

<button
type="submit"
class="login-btn">

Create Account

</button>

</form>

<div id="message"></div>

<a href="/login">

Already have an account? Login

</a>

</div>

</div>

<script src="/js/register.js"></script>

</body>

</html>
